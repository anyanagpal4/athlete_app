<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ athlete.name }} | Prospect</title>
  </head>
  <body class="bg-slate-50 font-sans antialiased text-slate-900">
    <div class="max-w-2xl mx-auto py-10 px-4">
      <div
        class="bg-white rounded-3xl p-8 shadow-xl shadow-slate-200/50 border border-slate-100 mb-6"
      >
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-4xl font-black tracking-tight text-slate-900">
              {{ athlete.name }}
            </h1>
            <p class="text-blue-600 font-bold text-lg uppercase tracking-wider mt-1">
              {{ athlete.sport }} • Class of {{ athlete.grad_year }}
            </p>
          </div>
        </div>
        <p class="mt-6 text-slate-600 leading-relaxed">{{ athlete.bio }}</p>
      </div>

      <div
        class="rounded-3xl overflow-hidden shadow-2xl bg-black mb-6 aspect-video border-4 border-white"
      >
        <iframe class="w-full h-full" src="{{ embed_url }}" frameborder="0" allowfullscreen></iframe>
      </div>

      <div class="bg-slate-900 rounded-3xl p-8 text-white">
        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">
          Key Metrics
        </h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-slate-800 p-4 rounded-2xl">
            <p class="text-xs text-slate-400 uppercase">Status</p>
            <p class="text-xl font-bold">Uncommitted</p>
          </div>
          <div class="bg-slate-800 p-4 rounded-2xl text-blue-400">
            <p class="text-xs text-slate-400 uppercase">Verified</p>
            <p class="text-xl font-bold">2026 Prospect</p>
          </div>
        </div>
      </div>

      <div class="text-center mt-8">
        <a
          class="text-blue-700 font-semibold hover:underline"
          href="{{ url_for('signup') }}"
          >Create another profile</a
        >
      </div>
    </div>
  </body>
</html>
